<script>
    let currentKodeCrew = "";
    let currentCrewData = [];
    let listKapal = [];

    function muatReferensiKapal() {
        google.script.run.withSuccessHandler(function(data) {
            listKapal = data;
            let options = '<option value="">- Pilih Jenis -</option>';
            data.forEach(k => options += `<option value="${k}">${k}</option>`);
            const dropdowns = document.querySelectorAll('.dropdown-kapal');
            dropdowns.forEach(sel => sel.innerHTML = options);
        }).getShipTypes();
    }

    function lihatDetail(kodeCrew) {
      currentKodeCrew = kodeCrew;
      loadPage('CrewDetail');
      document.getElementById('detail-nama-kru').innerText = "Memuat Profil...";
      
      // Kosongkan tabel sementara agar terlihat efek loading
      document.getElementById('table-fam').innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2 text-primary"></div>Memuat...</td></tr>';
      document.getElementById('table-doc').innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2 text-primary"></div>Memuat...</td></tr>';
      document.getElementById('table-sea').innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2 text-primary"></div>Memuat...</td></tr>';

      muatReferensiKapal(); // Ini kecil jadi biarkan saja berjalan terpisah

      // ==========================================
      // OPTIMASI: TARIK SEMUA TABEL DALAM 1 REQUEST
      // ==========================================
      google.script.run
          .withSuccessHandler(function(res) {
              if (!res.profil) { alert("Data Kru tidak ditemukan!"); loadPage('CrewList'); return; }
              
              // 1. Render Kartu Profil Utama
              renderProfile(res.profil);
              
              // 2. Tembakkan Data ke Masing-masing Tabel
              renderTableFam(res.famData);
              renderTableDoc(res.docData);
              renderTableSea(res.seaData);
          })
          .withFailureHandler(function(error){ alert("Gagal memuat detail: " + error.message); loadPage('CrewList'); })
          .getCrewFullDetail(kodeCrew);
  }

    function renderProfile(data) {
        if(!data) { alert("Data Kru tidak ditemukan!"); loadPage('CrewList'); return; }
        currentCrewData = data;
        var imgElemen = document.getElementById('detail-foto');
        if (imgElemen) {
            let linkFotoDrive = data[10] || '';
            var namaAsli = data[1] ? data[1] : 'Kru';
            var namaFormat = namaAsli.replace(/ /g, "+");
            var linkInisial = "https://ui-avatars.com/api/?name=" + namaFormat + "&size=120&background=random&color=fff";
            if (linkFotoDrive && linkFotoDrive.includes('drive.google.com')) {
                let fileIdMatch = linkFotoDrive.match(/[-\w]{25,}/);
                if (fileIdMatch && fileIdMatch[0]) {
                    imgElemen.src = "https://drive.google.com/thumbnail?id=" + fileIdMatch[0] + "&sz=w400";
                    imgElemen.onerror = function() { this.onerror = null; this.src = linkInisial; };
                } else { imgElemen.src = linkInisial; }
            } else { imgElemen.src = linkInisial; }
        }

        document.getElementById('detail-kode').innerText = data[0] || '-';
        document.getElementById('detail-nama-kru').innerText = data[1] || '-';
        document.getElementById('detail-jabatan').innerText = data[2] || '-';
        document.getElementById('detail-ttl').innerText = (data[3] || '-') + ", " + (data[4] || '-');
        document.getElementById('detail-telepon').innerText = data[5] || '-';
        document.getElementById('detail-email').innerText = data[6] || '-';
        document.getElementById('detail-asal').innerText = data[7] || '-';
        document.getElementById('detail-nik').innerText = data[8] || '-';
        document.getElementById('detail-status').innerText = data[12] || '-';
        document.getElementById('detail-usia').innerText = data[13] || '-';
        document.getElementById('detail-skill').innerText = data[14] || '-';
        document.getElementById('detail-tgl-input').innerText = data[16] ? data[16].toString().substring(0,10) : '-';
    }

    // OPTIMASI: DOM Rendering
    function renderTableFam(data) {
        const tbody = document.getElementById('table-fam');

        if(data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Belum ada data keluarga.</td></tr>';
            return;
        }
        
        let htmlString = '';
        data.forEach(row => {
            htmlString += `<tr>
                <td class="ps-3 fw-bold">${row[2] || '-'}</td>
                <td>${row[3] || '-'}</td>
                <td>${row[5] || '-'}</td>
                <td class="text-center pe-3">
                    <div class="d-flex justify-content-center gap-2">
                        <button class="btn btn-sm btn-light text-warning shadow-sm border-0" onclick="bukaModalEditFam('${row[0]}','${row[2]}','${row[3]}','${row[4]}','${row[5]}','${row[6]}')" title="Edit Data"><i class="bi bi-pencil-square"></i></button>

                    </div>
                </td>
            </tr>`;
        });
        tbody.innerHTML = htmlString;
    }

    // OPTIMASI: DOM Rendering
    function renderTableDoc(data) {
        const tbody = document.getElementById('table-doc');
        if(!tbody) return;
        
        if(data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Belum ada dokumen yang diinput.</td></tr>';
            return;
        }

        const docOrder = [
            "PP", "CDC", "YELLOW", "COC", "COE", "GMDSS", "GMDSE", "ABLE/RATING", 
            "BST", "AFF", "SCRB", "MFA", "SAT", "SDSD", "SSO", "MCOB", "ERRM", 
            "BRM", "ARPA", "RADAR", "ECDIS", "BOCT", "BLGT", "AOT", "ACT", "ALGT"
        ];
        data.sort((a, b) => {
            let tipeA = (a[2] || "").toString().toUpperCase().trim();
            let tipeB = (b[2] || "").toString().toUpperCase().trim();
            let rankA = docOrder.findIndex(d => tipeA === d || tipeA.includes(d));
            let rankB = docOrder.findIndex(d => tipeB === d || tipeB.includes(d));
            rankA = rankA === -1 ? 999 : rankA; rankB = rankB === -1 ? 999 : rankB;
            if (rankA === rankB) return tipeA.localeCompare(tipeB);
            return rankA - rankB;
        });

        const hariIni = new Date();
        let htmlString = '';
        data.forEach(function(row) {
            const tipeDokumen = (row[2] || "").toString().toUpperCase().trim();
            let expiryDateStr = row[6] || "";
            let expiryDisplay = expiryDateStr || '-';

            if (expiryDateStr) {
                let expDate = new Date(expiryDateStr);
                let sisaBulan = (expDate.getFullYear() - hariIni.getFullYear()) * 12 + (expDate.getMonth() - hariIni.getMonth());
                if (hariIni.getDate() > expDate.getDate()) { sisaBulan--; }
                if (tipeDokumen === "PP" || tipeDokumen.includes("PASPOR")) {
                    if (sisaBulan < 18) { expiryDisplay = `<span class="text-danger fw-bold">${expiryDateStr}</span>`; }
                } else {
                    if (sisaBulan < 12) { expiryDisplay = `<span class="text-danger fw-bold">${expiryDateStr}</span>`; }
                }
            }

            const indikatorFile = row[7] ? `<a href="${row[7]}" target="_blank" class="ms-2 text-success" title="Lihat Dokumen"><i class="bi bi-file-earmark-check-fill fs-5"></i></a>` : `<span class="ms-2 text-danger opacity-50" title="File belum diupload"><i class="bi bi-file-earmark-x-fill fs-5"></i></span>`;
            htmlString += `<tr>
                <td class="ps-3"><div class="d-flex align-items-center"><span class="fw-bold text-dark">${row[2] || '-'}</span>${indikatorFile}</div></td>
                <td>${row[3] || '-'}</td><td>${row[4] || '-'}</td><td>${row[5] || '-'}</td><td>${expiryDisplay}</td>
                <td class="text-center pe-3">
                    <div class="d-flex justify-content-center gap-2">
                        <button class="btn btn-sm btn-light text-warning shadow-sm border-0" onclick="bukaModalEditDoc('${row[0]}', '${row[1]}', '${row[2]}', '${row[3]}', '${row[4]}', '${row[5]}', '${row[6]}')" title="Edit Data"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-sm btn-light text-danger shadow-sm border-0" onclick="hapusDoc('${row[0]}')" title="Hapus Dokumen"><i class="bi bi-trash-fill"></i></button>
                    </div>
                </td>
            </tr>`;
        });
        tbody.innerHTML = htmlString;
    }

    // OPTIMASI: DOM Rendering
    function renderTableSea(data) {
        const tbody = document.getElementById('table-sea');

    function formatTanggalExcel(str) {
        if (!str || str === '-') return "";
        str = str.toString().trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
        if (str.includes('/') || str.includes('-')) {
            let separator = str.includes('/') ? '/' : '-';
            let parts = str.split(separator);
            if (parts.length === 3) {
                if (parts[0].length === 4) { return parts[0] + "-" + parts[1] + "-" + parts[2]; } 
                else { let y = parts[2]; if (y.length === 2) y = "20" + y; return y + "-" + parts[1].padStart(2, '0') + "-" + parts[0].padStart(2, '0'); }
            }
        }
        const date = new Date(str);
        if (!isNaN(date.getTime())) {
            const offsetDate = new Date(date.getTime() - (date.getTimezoneOffset() * 60000));
            return offsetDate.toISOString().split('T')[0];
        }
        return "";
    }

    function hitungDurasiInternal(on, off) {
        if (!on || !off) return "-";
        const d1 = new Date(on); const d2 = new Date(off);
        if (d2 < d1) return "Tgl Error";
        let months = (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
        let days = d2.getDate() - d1.getDate();
        if (days < 0) { months--; days += new Date(d2.getFullYear(), d2.getMonth(), 0).getDate(); }
        return (months > 0 ? months + " Bln " : "") + (days > 0 ? days + " Hari" : "");
    }

    function hapusKruUtama() {
        Swal.fire({

            icon: 'warning',

            cancelButtonColor: '#6c757d',
            confirmButtonText: '<i class="bi bi-trash-fill"></i> Ya, Hapus Kru',
            cancelButtonText: 'Batal'
        }).then((result) => {
            if (result.isConfirmed) {
                const btnHapus = document.getElementById('btn-delete-master');
                btnHapus.innerHTML = "Menghapus..."; btnHapus.disabled = true;
                google.script.run
                    .withSuccessHandler(function(pesan) {
                        alert(pesan); loadPage('CrewList'); loadDataCrew(); 
                        btnHapus.innerHTML = "Hapus Kru"; btnHapus.disabled = false;
                    })
                    .withFailureHandler(function(error) {
                        alert("Gagal menghapus: " + error.message);
                        btnHapus.innerHTML = "Hapus Kru"; btnHapus.disabled = false;
                    })
                    .deleteCrewData(currentKodeCrew);
            }
        });
    }

    function bukaModalSea() {
        document.getElementById('bulk_sea_kode_crew').value = currentKodeCrew;
        document.getElementById('excel_paste_sea').value = "";
        document.getElementById('bulk_sea_table_body').innerHTML = '<tr><td colspan="9" class="text-center text-muted">Belum ada data di-paste</td></tr>';
        new bootstrap.Modal(document.getElementById('modalTambahSea')).show();

    document.getElementById('excel_paste_sea').addEventListener('paste', function(e) {
        e.preventDefault();
        const clipboardData = e.clipboardData || window.clipboardData; const pastedData = clipboardData.getData('Text');
        const rows = pastedData.split(/\r?\n/).filter(row => row.trim() !== "");
        const tableBody = document.getElementById('bulk_sea_table_body'); tableBody.innerHTML = '';
        let optKapal = '<option value="">Pilih</option>'; listKapal.forEach(k => optKapal += `<option value="${k}">${k}</option>`);

        rows.forEach((row) => {
            const cols = row.split('\t');
            if (cols.length >= 2) {
                const tr = document.createElement('tr');
                const tglOn = formatTanggalExcel(cols[5] || ''); const tglOff = formatTanggalExcel(cols[6] || '');
                const durasi = hitungDurasiInternal(tglOn, tglOff);
                tr.innerHTML = `
                    <td><input type="text" class="form-control form-control-sm s-kapal" value="${cols[0] || ''}"></td>
                    <td><select class="form-select form-select-sm s-jenis">${optKapal}</select></td>
                    <td><input type="text" class="form-control form-control-sm s-bendera" value="${cols[1] || ''}"></td>
                    <td><input type="text" class="form-control form-control-sm s-grt" value="${cols[2] || ''}"></td>
                    <td><input type="text" class="form-control form-control-sm s-rank" value="${cols[3] || ''}"></td>
                    <td><input type="text" class="form-control form-control-sm s-perush" value="${cols[4] || ''}"></td>
                    <td><input type="date" class="form-control form-control-sm s-on" value="${tglOn}"></td>
                    <td><input type="date" class="form-control form-control-sm s-off" value="${tglOff}"></td>
                    <td><input type="text" class="form-control form-control-sm s-durasi bg-light" value="${durasi}" readonly></td>
                `;
                tableBody.appendChild(tr);
            }
        });
    });

    async function prosesSimpanSeaBulk() {
        const btn = document.getElementById('btn-save-sea-bulk'); const rows = document.getElementById('bulk_sea_table_body').querySelectorAll('tr');
        if (rows.length === 0 || rows[0].innerText.includes("Belum ada")) return alert("Data kosong!");

        btn.disabled = true; btn.innerHTML = "Menyimpan...";
        for (const tr of rows) {
            const payload = {
                sea_kode_crew: currentKodeCrew, sea_kapal: tr.querySelector('.s-kapal').value, sea_jenis_kapal: tr.querySelector('.s-jenis').value,
                sea_bendera: tr.querySelector('.s-bendera').value, sea_grt: tr.querySelector('.s-grt').value, sea_rank: tr.querySelector('.s-rank').value,
                sea_perusahaan: tr.querySelector('.s-perush').value, sea_on: tr.querySelector('.s-on').value, sea_off: tr.querySelector('.s-off').value
            };
            await new Promise(resolve => google.script.run.withSuccessHandler(resolve).addSeaServiceData(payload));
        }
        alert("Semua riwayat pengalaman berhasil disimpan!");
        btn.disabled = false; btn.innerHTML = "Simpan Semua Pengalaman";
        bootstrap.Modal.getInstance(document.getElementById('modalTambahSea')).hide();
        google.script.run.withSuccessHandler(renderTableSea).getRelatedData(currentKodeCrew, 'Crew_SeaServices');
    }

    document.getElementById('excel_paste_area').addEventListener('paste', function(e) {
        e.preventDefault();
        const clipboardData = e.clipboardData || window.clipboardData; const pastedData = clipboardData.getData('Text');
        const rows = pastedData.split(/\r?\n/).filter(row => row.trim() !== "");
        const inputTipe = document.querySelectorAll('.in-tipe'); const inputNomor = document.querySelectorAll('.in-nomor');
        const inputTempat = document.querySelectorAll('.in-tempat'); const inputIssued = document.querySelectorAll('.in-issued');
        const inputExpiry = document.querySelectorAll('.in-expiry');

        rows.forEach((row, i) => {
            if (inputTipe[i]) {
                const cols = row.split('\t'); 
                if (cols[0] !== undefined) inputTipe[i].value = cols[0].trim();
                if (cols[1] !== undefined) inputNomor[i].value = cols[1].trim();
                if (cols[2] !== undefined) inputTempat[i].value = cols[2].trim();
                if (cols[3] !== undefined) inputIssued[i].value = formatTanggalExcel(cols[3]);
                if (cols[4] !== undefined) inputExpiry[i].value = formatTanggalExcel(cols[4]);
            }
        });
    });

    // OPTIMASI: HTML5 Canvas Image Compression
    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            if (!file.type.match(/image.*/)) {
                const reader = new FileReader(); reader.onload = (e) => resolve(e.target.result); reader.readAsDataURL(file); return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; const MAX_HEIGHT = 1200;
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                    else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function simpanSatuDokumen(payload) {
        return new Promise((resolve, reject) => {
            google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).addDocumentData(payload);

    async function prosesSimpanBulk() {
      const files = document.getElementById('bulk_doc_files').files; const kodeCrew = currentKodeCrew;
      const btnSave = document.getElementById('btn-save-bulk'); const progressText = document.getElementById('upload_progress');
      if (files.length === 0) return alert("Pilih file terlebih dahulu!");

      btnSave.disabled = true;
      const tipeDocs = document.querySelectorAll('.in-tipe'); const nomorDocs = document.querySelectorAll('.in-nomor');
      const tempatDocs = document.querySelectorAll('.in-tempat'); const issuedDocs = document.querySelectorAll('.in-issued');
      const expiryDocs = document.querySelectorAll('.in-expiry');

      for (let i = 0; i < files.length; i++) {
          progressText.innerText = `Mengunggah (${i + 1}/${files.length}): ${files[i].name}`;
          const file = files[i]; const data = await readFileAsBase64(file);
          const payload = {
              doc_kode_crew: kodeCrew, doc_tipe: tipeDocs[i].value, doc_nomor: nomorDocs[i].value,
              doc_tempat: tempatDocs[i].value, doc_issued: issuedDocs[i].value, doc_expiry: expiryDocs[i].value,
              fileName: files[i].name, fileData: data
          };
          await simpanSatuDokumen(payload);
      }

      alert("Semua dokumen berhasil diunggah!");
      
      setTimeout(() => {
        paksaBersihkanUI();
        tanyaLanjutPengalaman();
    }, 400);
      
      // --- PERBAIKAN: RESET FORM SETELAH SELESAI ---
      btnSave.disabled = false; 
      progressText.innerText = "";
      
      document.getElementById('bulk_doc_files').value = "";
      document.getElementById('excel_paste_area').value = "";
      document.getElementById('bulk_doc_table_body').innerHTML = '<tr><td colspan="6" class="text-center text-muted">Belum ada file dipilih</td></tr>';
      
      bootstrap.Modal.getInstance(document.getElementById('modalTambahDoc')).hide();
      
      // Refresh tabel dokumen
      google.script.run.withSuccessHandler(renderTableDoc).getRelatedData(currentKodeCrew, 'Crew_Doc');
  }
